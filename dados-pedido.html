<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados do Pedido | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<main class="container">
  <a href="carrinho.html" class="back-button">← Voltar</a>

  <section class="page-header">
    <h1>Dados do Pedido</h1>
    <p class="subtitle">Confirme as informações para finalizar.</p>
  </section>

  <section class="order-data">
    <h3>Forma de recebimento</h3>

    <div class="info-box">
      <strong>Retirada na loja</strong>
      <p>Unidade: Recife - Boa Viagem</p>
      <p>Tempo estimado: 20 minutos</p>
    </div>

    <label>Nome</label>
    <input type="text" placeholder="Seu nome">

    <label>Telefone</label>
    <input type="tel" placeholder="(00) 00000-0000">

    <label>Observações</label>
    <textarea placeholder="Ex.: Retirar no balcão principal."></textarea>

    <a href="pagamento.html" class="btn btn-primary">Continuar para pagamento</a>
  </section>
</main>

<script src="js/script.js"></script>

</body>
</html>
