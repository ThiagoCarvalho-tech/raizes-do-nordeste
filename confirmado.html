<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado | Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container">
  <section class="success-screen">
    <div class="success-icon">✓</div>

    <h1>Pedido Confirmado!</h1>
    <p class="subtitle">Seu pagamento foi aprovado e o pedido foi recebido com sucesso.</p>

    <div class="info-box">
      <p>Número do pedido</p>
      <h2 id="numero-pedido">#0000</h2>
      <p>Unidade: Recife - Boa Viagem</p>
    </div>

    <section class="order-status">
      <h3>Acompanhe seu pedido</h3>

      <div class="status-item active">Recebido</div>
      <div class="status-item active">Em preparo</div>
      <div class="status-item">Pronto para retirada</div>
      <div class="status-item">Finalizado</div>
    </section>

    <a href="cardapio.html" class="btn btn-primary">Voltar ao Cardápio</a>
    <a href="historico.html" class="btn btn-secondary">Ver Histórico</a>
  </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
