<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | Raízes do Nordeste</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <div class="top-bar">
            <button class="back-button" onclick="history.back()">
                ←
            </button>
        </div>

        <section class="page-header">

            <h1>Pagamento</h1>

            <p class="subtitle">
                Escolha uma forma de pagamento.
            </p>

        </section>

        <section class="payment-methods">

            <label class="payment-option">
                <input type="radio" name="pagamento" checked>
                PIX
            </label>

            <label class="payment-option">
                <input type="radio" name="pagamento">
                Cartão de Crédito
            </label>

            <label class="payment-option">
                <input type="radio" name="pagamento">
                Cartão de Débito
            </label>

            <label class="payment-option">
                <input type="radio" name="pagamento">
                Dinheiro
            </label>

        </section>

        <section class="payment-summary">

            <div>
                <span>Subtotal</span>
                <strong>R$ 27,80</strong>
            </div>

            <div>
                <span>Taxa de entrega</span>
                <strong>R$ 0,00</strong>
            </div>

            <div class="total">
                <span>Total</span>
                <strong>R$ 27,80</strong>
            </div>

        </section>

        <div class="payment-warning">

            <p>
                🔒 O pagamento será processado por um
                <strong>serviço externo seguro</strong>.
            </p>

        </div>

        <button class="btn btn-primary" onclick="simularPagamento()">
            Confirmar Pagamento
        </button>

    </main>

    <script>

        function simularPagamento() {

            const aprovado = Math.random() > 0.3;

            if (aprovado) {

                window.location.href = "confirmado.html";

            } else {

                alert("Pagamento não autorizado. Tente novamente.");

            }

        }

    </script>

    <script src="js/script.js"></script>

</body>

</html>
