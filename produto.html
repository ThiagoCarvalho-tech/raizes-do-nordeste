<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuscuz Nordestino | Raízes do Nordeste</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container page-with-nav">

        <a href="cardapio.html" class="back-button">
            ← Voltar
        </a>

        <section class="product-details">

            <img
                src="img/cuscuz.jpg"
                alt="Cuscuz Nordestino"
                class="product-image">

            <h1>Cuscuz Nordestino</h1>

            <p class="product-description">
                Cuscuz tradicional recheado com carne de sol desfiada,
                queijo coalho, manteiga da terra e acompanhado de vinagrete.
            </p>

            <h3>Ingredientes</h3>

            <ul class="ingredients">
                <li>Cuscuz de milho</li>
                <li>Carne de sol</li>
                <li>Queijo coalho</li>
                <li>Manteiga da terra</li>
                <li>Vinagrete</li>
            </ul>

            <div class="price-row">

                <strong>R$ 18,90</strong>

                <div class="quantity">

                    <button>-</button>

                    <span>1</span>

                    <button>+</button>

                </div>

            </div>

            <label class="obs-title">
                Observações
            </label>

            <textarea
                placeholder="Ex.: Sem cebola ou pouco sal."></textarea>

            <button class="btn btn-primary">
                Adicionar ao Carrinho
            </button>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
